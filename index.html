/* ══ OPEN-METEO WEATHER ═══════════════════════════════ */
// WMO weather code → emoji + label
function wmoIcon(code){
  if(code===0)return{e:'☀️',l:'Clear'};
  if(code<=2)return{e:'⛅',l:'Partly Cloudy'};
  if(code===3)return{e:'☁️',l:'Overcast'};
  if(code<=49)return{e:'🌫️',l:'Fog'};
  if(code<=59)return{e:'🌦️',l:'Drizzle'};
  if(code<=69)return{e:'🌧️',l:'Rain'};
  if(code<=79)return{e:'🌨️',l:'Snow'};
  if(code<=82)return{e:'🌧️',l:'Showers'};
  if(code<=86)return{e:'🌨️',l:'Snow Showers'};
  return{e:'⛈️',l:'Thunderstorm'};
}

const SUMMERLAND = {lat:49.605,lng:-119.673};

async function fetchWeather(){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${SUMMERLAND.lat}&longitude=${SUMMERLAND.lng}`+
    `&current=temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code,apparent_temperature`+
    `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,weather_code`+
    `&timezone=America%2FVancouver&forecast_days=5`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('weather fetch failed');
  return r.json();
}

function parseWeather(data){
  const c=data.current,d=data.daily;
  const days=['Today','Tue','Wed','Thu','Fri'];
  const dayNames=d.time.map((t,i)=>i===0?'Today':new Date(t+'T12:00:00').toLocaleDateString('en',{weekday:'short'}));
  return {
    current:{
      temp:Math.round(c.temperature_2m),
      feelsLike:Math.round(c.apparent_temperature),
      wind:Math.round(c.wind_speed_10m),
      humidity:Math.round(c.relative_humidity_2m),
      ...wmoIcon(c.weather_code),
    },
    forecast:d.time.map((_,i)=>({
      day:dayNames[i],
      high:Math.round(d.temperature_2m_max[i]),
      low:Math.round(d.temperature_2m_min[i]),
      rain:d.precipitation_probability_max[i]+'%',
      wind:Math.round(d.wind_speed_10m_max[i])+' km/h',
      ...wmoIcon(d.weather_code[i]),
    }))
  };
}

    satRef.current.addTo(map);
    mapRef.current=map;
    return()=>{map.remove();mapRef.current=null;};
  },[]);

  useEffect(()=>{
    const map=mapRef.current;if(!map)return;
    zLayersRef.current.forEach(l=>map.removeLayer(l));zLayersRef.current=[];
    if(!zones.length)return;
    zones.forEach(z=>{
      const fill=MAP_FILL[z.status]||'rgba(148,163,184,.35)';
      const stroke=MAP_STROKE[z.status]||'#94a3b8';
      const poly=L.polygon(z.coords,{fillColor:fill,fillOpacity:1,color:stroke,weight:2,opacity:.9});
      poly.bindPopup(
        `<div style="padding:14px 16px"><div style="font-size:15px;font-weight:700;color:#1e293b;margin-bottom:8px">${z.name}</div>`+
        `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">`+
        `<span style="font-size:11px;color:#64748b">${z.crop} · ${z.lastRead}</span>`+
        `<span style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:${fill};color:${stroke};border:1.5px solid ${stroke}">${z.moisture}% · ${z.status}</span>`+
        `</div></div>`,{maxWidth:300,closeButton:false}
      );
      poly.addTo(map);zLayersRef.current.push(poly);
    });
    const all=zones.flatMap(z=>z.coords);
    map.fitBounds(L.latLngBounds(all),{padding:[24,24]});
  },[zones]);

  useEffect(()=>{
    const map=mapRef.current;if(!map)return;
    fMarkersRef.current.forEach(m=>map.removeLayer(m));fMarkersRef.current=[];
    const colors=['#166534','#1d4ed8','#b45309'];
    farms.forEach((f,i)=>{
      const cur=i===farmId;
      const icon=L.divIcon({className:'farm-marker-icon',
        html:`<div class="farm-pin" style="background:${cur?'white':colors[i]};color:${cur?colors[i]:'white'};border-color:${cur?colors[i]:'white'}">${f.icon} ${f.name}</div>`,
        iconAnchor:[0,0]});
      const m=L.marker([f.lat,f.lng],{icon,zIndexOffset:cur?1000:0});
      m.addTo(map);fMarkersRef.current.push(m);
    });
  },[farmId,farms]);

  const switchLayer=m=>{
    const map=mapRef.current;if(!map)return;
    setMode(m);
    if(m==='sat'){map.removeLayer(streetRef.current);satRef.current.addTo(map);}
    else{map.removeLayer(satRef.current);streetRef.current.addTo(map);}
    zLayersRef.current.forEach(l=>l.bringToFront());
  };

  const btnStyle=(active)=>({background:active?'#f0fdf4':'white',color:active?'#166534':'#64748b',border:`1.5px solid ${active?'#bbf7d0':'#e2e8f0'}`,borderRadius:9,padding:'6px 14px',fontSize:10,fontWeight:800,boxShadow:'0 1px 4px rgba(0,0,0,.1)',cursor:'pointer'});

  return(
    <div style={{position:'relative',borderRadius:22,overflow:'hidden',border:'1.5px solid #e2e8f0',boxShadow:'0 4px 20px rgba(0,0,0,.07)',height:420}}>
      <div ref={ref} style={{width:'100%',height:'100%'}}/>
      <div style={{position:'absolute',top:12,right:12,zIndex:500,display:'flex',gap:6}}>
        <button onClick={()=>switchLayer('sat')} style={btnStyle(mode==='sat')}>🛰 Satellite</button>
        <button onClick={()=>switchLayer('street')} style={btnStyle(mode==='street')}>🗺 Street</button>
      </div>
    </div>
  );
};

/* Weather forecast card */
const WeatherCard=({weather,loading})=>{
  if(loading) return(
    <div style={{background:'white',border:'1.5px solid #f1f5f9',borderRadius:22,padding:32,boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:28}}>
        <div><div className="skeleton" style={{height:24,width:180,marginBottom:8}}/><div className="skeleton" style={{height:12,width:120}}/></div>
        <div className="skeleton" style={{height:36,width:120,borderRadius:20}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
        {[0,1,2,3,4].map(i=><div key={i} className="skeleton" style={{height:140,borderRadius:14}}/>)}
      </div>
    </div>
  );

  const cur=weather?.current;
  return(
    <div style={{background:'white',border:'1.5px solid #f1f5f9',borderRadius:22,padding:32,boxShadow:'0 1px 4px rgba(0,0,0,.05)'}}>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:28,flexWrap:'wrap',gap:16}}>
        <div>
          <div style={{fontSize:19,fontWeight:800,color:'#1e293b',letterSpacing:'-.3px'}}>Coming Weather</div>
          <div style={{fontSize:9.5,fontWeight:800,color:'#94a3b8',letterSpacing:'1.2px',textTransform:'uppercase',marginTop:4}}>
            Summerland, BC · Live via Open-Meteo
          </div>
          {cur && <div style={{display:'flex',alignItems:'center',gap:10,marginTop:10}}>
            <span style={{fontSize:22}}>{cur.e}</span>
            <span style={{fontSize:26,fontWeight:800,color:'#1e293b'}}>{cur.temp}°C</span>
            <div style={{fontSize:10,color:'#94a3b8',lineHeight:1.5}}>
              <div>Feels like {cur.feelsLike}°C</div>
              <div>{cur.humidity}% humidity · {cur.wind} km/h</div>
            </div>
          </div>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:7,background:'#eff6ff',color:'#1d4ed8',padding:'8px 18px',borderRadius:9999,border:'1px solid #bfdbfe',fontSize:11,fontWeight:800,letterSpacing:'1px',textTransform:'uppercase',flexShrink:0}}>
          ☁ Plan Irrigation
        </div>
      </div>

      <div className="forecast-grid" style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
        {(weather?.forecast||[]).map((day,i)=>(
          <div key={i} className="forecast-day" style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'14px 8px',borderRadius:14,border:'1px solid transparent',transition:'all .15s',cursor:'default'}}>
            <span style={{fontSize:9.5,fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'1.8px',marginBottom:10}}>{day.day}</span>
            <span style={{fontSize:28,marginBottom:10,lineHeight:1}}>{day.e}</span>
            <p style={{fontSize:16,fontWeight:800,color:'#1e293b'}}>{day.high}°<span style={{color:'#cbd5e1',fontWeight:400,marginLeft:3}}>{day.low}°</span></p>
            <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid #f8fafc',width:'100%',display:'flex',flexDirection:'column',gap:6}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,fontWeight:800}}>
                <span style={{color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.5px'}}>Rain</span>
                <span style={{color:'#3b82f6'}}>{day.rain}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,fontWeight:800}}>
                <span style={{color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.5px'}}>Wind</span>
                <span style={{color:'#475569'}}>{day.wind}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ══ MAIN APP ════════════════════════════════════════════ */
function App(){
  const [farmId,setFarmId]=useState(0);
  const [viewMode,setViewMode]=useState('grid');
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [time,setTime]=useState(new Date());
  const [zones,setZones]=useState(()=>HOME_ZONES.map(z=>({...z})));
  const [syncing,setSyncing]=useState(false);
  const [weather,setWeather]=useState(null);
  const [weatherLoading,setWeatherLoading]=useState(true);
  const [weatherError,setWeatherError]=useState(null);

  const farm=FARMS[farmId];

  // Clock
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  // Fetch weather on mount + every 30 min
  const loadWeather=useCallback(async()=>{
    setWeatherLoading(true);setWeatherError(null);
    try{const d=await fetchWeather();setWeather(parseWeather(d));}
    catch(e){setWeatherError('Unable to load weather.');console.warn(e);}
    finally{setWeatherLoading(false);}
  },[]);
  useEffect(()=>{loadWeather();const t=setInterval(loadWeather,30*60*1000);return()=>clearInterval(t);},[loadWeather]);

  // Zone drift
  useEffect(()=>{
    const t=setInterval(()=>{
      setZones(prev=>prev.map(z=>{
        if(Math.random()>.82){
          const m=Math.max(10,Math.min(92,z.moisture+Math.round((Math.random()-.52)*2)));
          return {...z,moisture:m,status:m>=55?'Optimal':m>=35?'Action Required':m>=80?'Too Wet':'Critical'};
        }
        return z;
      }));
    },15000);
    return()=>clearInterval(t);
  },[]);

  const handleFarmSelect=id=>{setFarmId(id);setZones(FARMS[id].zones.map(z=>({...z})));};

  const doSync=()=>{
    setSyncing(true);
    Promise.all([
      new Promise(res=>setTimeout(()=>{
        setZones(prev=>prev.map(z=>{
          if(Math.random()>.4){const m=Math.max(10,Math.min(92,z.moisture+Math.round((Math.random()-.52)*3)));return {...z,moisture:m,status:m>=55?'Optimal':m>=35?'Action Required':m>=80?'Too Wet':'Critical'};}
          return z;
        }));res();
      },900)),
      loadWeather()
    ]).finally(()=>setSyncing(false));
  };

  const handleAction=zone=>{
    const msgs={'Critical':`Irrigation reminder set for ${zone.name}.\nRecommended: 45 min at medium flow.`,'Action Required':`Irrigation scheduled for ${zone.name} — tomorrow morning.`,'Optimal':`${zone.name} is healthy. No action needed.`,'Too Wet':`Checking drainage for ${zone.name}.`};
    alert(msgs[zone.status]||'');
  };

  const sorted=useMemo(()=>[...zones].sort((a,b)=>a.moisture-b.moisture),[zones]);
  const avg=useMemo(()=>zones.length?Math.round(zones.reduce((s,z)=>s+z.moisture,0)/zones.length):0,[zones]);
  const crits=zones.filter(z=>z.status==='Critical').length;
  const warns=zones.filter(z=>z.status==='Action Required').length;

  const farmBadge=id=>{
    const f=FARMS[id];if(!f.zones.length)return{label:'—',bg:'#f1f5f9',color:'#94a3b8'};
    const cr=f.zones.filter(z=>z.status==='Critical').length;
    const wa=f.zones.filter(z=>z.status==='Action Required').length;
    if(cr>0)return{label:cr,bg:'#fff1f2',color:'#dc2626'};
    if(wa>0)return{label:wa,bg:'#fffbeb',color:'#d97706'};
    return{label:'✓',bg:'#f0fdf4',color:'#166534'};
  };

  const sidebarBtnStyle=(active)=>({
    width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',
    borderRadius:12,border:'none',background:active?'#f0fdf4':'transparent',
    color:active?'#166534':'#64748b',cursor:'pointer',textAlign:'left',
    marginBottom:2,transition:'all .15s',fontFamily:'inherit',
  });

  return(
    <div className="app" style={{fontFamily:"'Plus Jakarta Sans',sans-serif"}}>

      {/* ── SIDEBAR ── */}
      <aside className={`sidebar ${sidebarOpen?'sidebar-wide':'sidebar-narrow'}`}
        style={{background:'white',borderRight:'1px solid #e2e8f0',display:'flex',flexDirection:'column',zIndex:20}}>

        {/* Logo */}
        <div style={{padding:'20px 18px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid #f1f5f9',flexShrink:0}}>
          <LogoMark size={38}/>
          {sidebarOpen&&<div>
            <div style={{fontSize:16,fontWeight:800,color:'#1e293b',letterSpacing:'-.3px',lineHeight:1.2}}>Lekhi Farm</div>
            <div style={{fontSize:10,fontWeight:700,color:'#10b981',letterSpacing:'.5px'}}>Monitoring</div>
          </div>}
        </div>

        {/* Nav */}
        <nav style={{flex:1,padding:8,overflowY:'auto',overflowX:'hidden'}}>
          {sidebarOpen&&<span className="sb-label" style={{marginTop:8}}>Your Farms</span>}
          {FARMS.map((f,i)=>{
            const b=farmBadge(i);
            return(
              <button key={f.id} onClick={()=>handleFarmSelect(i)} style={sidebarBtnStyle(farmId===i)}>
                <span style={{fontSize:18,flexShrink:0,width:24,textAlign:'center'}}>{f.icon}</span>
                {sidebarOpen&&<>
                  <div style={{flex:1,minWidth:0,textAlign:'left'}}>
                    <div style={{fontSize:13,fontWeight:farmId===i?700:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
                    <div style={{fontSize:10,color:'#94a3b8',marginTop:1}}>{f.location}</div>
                  </div>
                  <span style={{fontSize:9.5,fontWeight:800,padding:'2px 8px',borderRadius:20,flexShrink:0,background:b.bg,color:b.color}}>{b.label}</span>
                </>}
              </button>
            );
          })}

          <div style={{height:1,background:'#f1f5f9',margin:'10px 4px'}}/>
          {sidebarOpen&&<span className="sb-label">Tools</span>}
          {[['Monthly History','M3 9h18M3 15h18M3 3h18v18H3z'],['Field Analysis','M22 12 L18 12 L15 21 L9 3 L6 12 L2 12'],['Sensor Config','M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z']].map(([lbl,d],i)=>(
            <button key={i} style={{...sidebarBtnStyle(false),color:'#64748b'}}
              onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d={d}/></svg>
              {sidebarOpen&&<span style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap'}}>{lbl}</span>}
            </button>
          ))}
        </nav>

        {/* Gateway */}
        {sidebarOpen&&<div className="gw-card">
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div className="gw-pulse" style={{width:8,height:8,borderRadius:'50%',background:'#10b981',flexShrink:0}}/>
            <span style={{fontSize:11,fontWeight:700,color:'#166534'}}>LoRa Gateway Online</span>
          </div>
          <div style={{fontSize:10,color:'#94a3b8',marginTop:4}}>Home Farm · –94 dBm · All sensors OK</div>
        </div>}

        {/* Collapse */}
        <button onClick={()=>setSidebarOpen(p=>!p)}
          style={{margin:8,padding:12,borderRadius:12,color:'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}
          onMouseEnter={e=>e.currentTarget.style.background='#f1f5f9'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            style={{transform:sidebarOpen?'none':'rotate(180deg)',transition:'transform .3s'}}>
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </aside>

      {/* ── MAIN ── */}
      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

        {/* Header */}
        <header style={{height:70,background:'white',borderBottom:'1px solid #e2e8f0',padding:'0 36px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <h1 style={{fontSize:21,fontWeight:800,color:'#1e293b',letterSpacing:'-.3px'}}>{farm.name}</h1>
            <p style={{fontSize:10,fontWeight:800,color:'#94a3b8',letterSpacing:'1.2px',textTransform:'uppercase',marginTop:2}}>{farm.location} · {farm.type}</p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            {weather&&!weatherLoading&&(
              <div style={{display:'flex',alignItems:'center',gap:6,background:'#f8fafc',padding:'6px 12px',borderRadius:10,border:'1px solid #f1f5f9'}}>
                <span style={{fontSize:18}}>{weather.current.e}</span>
                <span style={{fontSize:14,fontWeight:700,color:'#334155'}}>{weather.current.temp}°C</span>
                <span style={{fontSize:10,color:'#94a3b8',marginLeft:2}}>{weather.current.l}</span>
              </div>
            )}
            <div style={{textAlign:'right',marginRight:4}}>
              <div style={{fontSize:14,fontWeight:700,color:'#334155'}}>{time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
              <div style={{fontSize:9.5,fontWeight:800,color:'#94a3b8',letterSpacing:'1px',textTransform:'uppercase'}}>{time.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}</div>
            </div>
            <button onClick={doSync}
              style={{width:38,height:38,borderRadius:12,background:'#f8fafc',border:'1.5px solid #e2e8f0',color:'#166534',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg className={syncing?'syncing':''} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </button>
            <button style={{width:38,height:38,borderRadius:'50%',background:'#f8fafc',border:'1.5px solid #e2e8f0',color:'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
              {(crits+warns)>0&&<span className="alert-pulse" style={{position:'absolute',top:8,right:8,width:7,height:7,background:'#f43f5e',borderRadius:'50%',border:'2px solid white'}}/>}
            </button>
          </div>
        </header>

        {/* Scroll */}
        <div className="main-scroll">

          {/* Stats */}
          <div className="stats-grid" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
            <StatCard icon={weather?.current?.e||'🌡️'} label="Conditions" value={weather?.current?.temp??'—'} unit="°C" bg="#fef3c7"/>
            <StatCard icon="💧" label="Moisture Avg" value={avg} unit="%" bg="#dbeafe"/>
            <StatCard icon="💨" label="Wind Speed" value={weather?.current?.wind??'—'} unit="km/h" bg="#f1f5f9"/>
          </div>

          {/* Zones section */}
          <section>
            <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:12}}>
              <div>
                <h2 style={{fontSize:22,fontWeight:800,color:'#1e293b',letterSpacing:'-.3px'}}>Soil Status &amp; Recommendations</h2>
                <p style={{fontSize:13,color:'#64748b',marginTop:4}}>Block health and irrigation guidance — sorted driest first</p>
              </div>
              <div style={{display:'flex',padding:5,background:'#e2e8f0',borderRadius:13,gap:3,flexShrink:0}}>
                {[['grid','List View'],['map','Map View']].map(([v,lbl])=>(
                  <button key={v} onClick={()=>setViewMode(v)}
                    style={{padding:'8px 18px',borderRadius:9,fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:6,transition:'all .15s',fontFamily:'inherit',
                      background:viewMode===v?'white':'transparent',color:viewMode===v?'#166534':'#64748b',boxShadow:viewMode===v?'0 1px 4px rgba(0,0,0,.08)':'none'}}>
                    {v==='grid'
                      ?<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
                      :<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>}
                    {lbl}
                  </button>
                ))}
              </div>
            </div>

            {viewMode==='map'
              ?<LeafletMap zones={zones} farmId={farmId} farms={FARMS}/>
              :zones.length===0
                ?<div style={{textAlign:'center',padding:'60px 20px',color:'#94a3b8'}}>
                    <div style={{fontSize:40,marginBottom:12}}>🗺️</div>
                    <p style={{fontSize:14,fontWeight:600}}>No blocks mapped yet</p>
                    <p style={{fontSize:13,marginTop:6}}>Upload a KML file to add zones to this farm.</p>
                  </div>
                :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:20}}>
                    {sorted.map(z=><ZoneCard key={z.id} zone={z} onAction={handleAction}/>)}
                  </div>
            }
          </section>

          {/* Weather */}
          <WeatherCard weather={weather} loading={weatherLoading}/>

          {weatherError&&<div style={{textAlign:'center',fontSize:12,color:'#94a3b8',marginTop:-20}}>
            {weatherError} <button onClick={loadWeather} style={{color:'#166534',fontWeight:600,textDecoration:'underline',cursor:'pointer',background:'none',border:'none',fontSize:12}}>Retry</button>
          </div>}

          <div style={{height:24}}/>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
