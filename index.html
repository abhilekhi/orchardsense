<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4f0;color:#0f172a;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:#d1d9d1;border-radius:4px;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}
.left-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;background:#f0f4f0;border-right:1px solid #dde5dd;overflow:hidden;}
.right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}
.left-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 18px;display:flex;flex-direction:column;gap:14px;}
.left-scroll::-webkit-scrollbar{width:3px;}

/* ── TOPBAR ── */
.topbar{height:58px;background:white;border-bottom:1px solid #e2e8f0;padding:0 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;}

/* ── CARDS ── */
.card{background:white;border-radius:18px;border:1.5px solid #e4ebe4;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}

/* ── BRIEFING CARD ── */
.briefing-sentence{font-size:16px;font-weight:700;color:#1e293b;line-height:1.5;padding:18px 18px 14px;}
.briefing-sentence em{font-style:normal;color:#166534;}
.briefing-sentence .urgent{color:#dc2626;}
.rain-tip{display:flex;align-items:flex-start;gap:8px;padding:10px 18px 16px;border-top:1px solid #f1f5f9;}
.rain-tip-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.rain-tip-text{font-size:12px;color:#64748b;line-height:1.5;}

/* ── DOT STRIP ── */
.dot-strip-wrap{padding:14px 18px;}
.dot-strip-label{font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px;}
.dot-strip{display:flex;gap:8px;flex-wrap:wrap;}
.block-dot{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .15s;}
.block-dot:hover{transform:scale(1.12);}
.block-dot:active{transform:scale(.96);}
.dot-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;transition:box-shadow .15s;border:2.5px solid white;}
.block-dot.selected .dot-circle{box-shadow:0 0 0 3px currentColor;}
.dot-label{font-size:9px;font-weight:700;color:#64748b;}

/* ── BLOCK DETAIL PANEL ── */
.block-detail{border-top:1.5px solid #f1f5f9;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1);}
.detail-head{padding:14px 18px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.detail-name{font-size:18px;font-weight:800;color:#1e293b;letter-spacing:-.3px;}
.detail-crop{font-size:11px;color:#94a3b8;margin-top:2px;}
.status-badge{padding:5px 12px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;margin-top:2px;}
.moisture-section{padding:0 18px 14px;}
.moisture-big{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1;}
.moisture-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.2px;margin-top:2px;}
.moisture-bar-bg{height:8px;background:#f1f5f9;border-radius:20px;overflow:hidden;margin-top:12px;}
.moisture-bar-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.detail-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid #f8fafc;}
.detail-metric{padding:12px 14px;border-right:1px solid #f8fafc;}
.detail-metric:last-child{border-right:none;}
.dm-label{font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.dm-val{font-size:14px;font-weight:700;color:#334155;}
.detail-action{margin:0 18px 16px;}
.detail-action-btn{width:100%;padding:11px;border-radius:10px;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;border:none;font-family:inherit;transition:all .15s;}
.detail-action-btn:active{transform:scale(.99);opacity:.9;}

/* ── WEATHER CARD ── */
.weather-card{background:white;border-radius:18px;border:1.5px solid #e4ebe4;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.weather-now{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f1f5f9;}
.weather-icon{font-size:30px;line-height:1;flex-shrink:0;}
.weather-temp{font-size:30px;font-weight:800;color:#1e293b;letter-spacing:-1px;line-height:1;}
.weather-meta{font-size:10.5px;color:#94a3b8;line-height:1.7;}
/* Insight signals */
.signals-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#f1f5f9;border-top:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;}
.signal-cell{background:white;padding:12px 14px;}
.signal-icon{font-size:16px;margin-bottom:5px;}
.signal-label{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:#94a3b8;margin-bottom:3px;}
.signal-value{font-size:15px;font-weight:800;color:#1e293b;letter-spacing:-.3px;}
.signal-sub{font-size:9.5px;color:#94a3b8;margin-top:2px;line-height:1.4;}
.signal-cell.alert{background:#fff8f8;}
.signal-cell.alert .signal-value{color:#dc2626;}
.signal-cell.warn{background:#fffdf0;}
.signal-cell.warn .signal-value{color:#d97706;}
.signal-cell.good{background:#f8fdf9;}
.signal-cell.good .signal-value{color:#166534;}
/* Forecast row */
.forecast-row{display:flex;}
.forecast-cell{flex:1;padding:9px 3px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:1px solid #f8fafc;}
.forecast-cell:last-child{border-right:none;}
.forecast-cell.rain-day{background:#f0f7ff;}
.forecast-cell.frost-day{background:#f0f4ff;}
.fc-day-label{font-size:8px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1.2px;}
.fc-day-label.rain-label{color:#1d4ed8;}
.fc-day-label.frost-label{color:#7c3aed;}
.fc-icon{font-size:17px;line-height:1;}
.fc-high{font-size:11.5px;font-weight:800;color:#1e293b;}
.fc-low{font-size:10px;color:#94a3b8;}
.fc-low.frost{color:#7c3aed;font-weight:700;}
.fc-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:1px;}
/* ET bar */
.et-section{padding:10px 14px 12px;border-top:1px solid #f8fafc;}
.et-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.et-bar-bg{height:5px;background:#f1f5f9;border-radius:10px;overflow:hidden;}
.et-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#fbbf24,#f43f5e);}

/* ── FARM TABS ── */
.farm-tabs{display:flex;gap:6px;padding:14px 18px 0;flex-shrink:0;}
.farm-tab{flex:1;padding:8px 10px;border-radius:10px;border:1.5px solid #e4ebe4;background:white;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;}
.farm-tab.active{background:#166534;border-color:#166534;}
.farm-tab:not(.active):hover{background:#f0fdf4;border-color:#bbf7d0;}
.farm-tab-icon{font-size:16px;display:block;margin-bottom:3px;}
.farm-tab-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.farm-tab.active .farm-tab-name{color:white;}
.farm-tab:not(.active) .farm-tab-name{color:#475569;}
.farm-tab-badge{font-size:8px;font-weight:800;padding:1px 6px;border-radius:10px;margin-top:3px;display:inline-block;}
.farm-tab.active .farm-tab-badge{background:rgba(255,255,255,.25);color:white;}

/* ── MAP ── */
.map-container{flex:1;position:relative;overflow:hidden;}
#leaflet-map{width:100%;height:100%;}
.map-overlay-btns{position:absolute;top:12px;right:12px;z-index:500;display:flex;gap:6px;}
.map-btn{background:white;border:1.5px solid #e2e8f0;border-radius:8px;padding:5px 12px;font-size:10px;font-weight:800;color:#64748b;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.1);transition:all .15s;}
.map-btn.active{background:#f0fdf4;color:#166534;border-color:#bbf7d0;}
.map-no-blocks{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:8px;}
.map-no-blocks-card{background:white;border-radius:14px;padding:16px 22px;border:1.5px solid #e2e8f0;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;}

/* ── LEAFLET ── */
.leaflet-popup-content-wrapper{background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.14);border:1.5px solid #e2e8f0;padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0;line-height:1;}
.leaflet-popup-tip-container{display:none;}
.farm-marker-icon{background:none;border:none;}
.farm-pin{font-size:10px;font-weight:800;padding:5px 11px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.18);border:2px solid white;font-family:'Plus Jakarta Sans',sans-serif;}

/* ── NO SENSOR STATE ── */
.no-sensor-row{padding:16px 18px;text-align:center;color:#94a3b8;}
.no-sensor-row p{font-size:13px;font-weight:600;margin-bottom:4px;color:#64748b;}
.no-sensor-row span{font-size:11px;}

/* ── ANIMATIONS ── */
@keyframes gwp{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}70%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.gw-pulse{animation:gwp 2.5s infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.syncing{animation:spin .8s linear infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.alert-pulse{animation:pulse 2s infinite;}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.85}100%{opacity:.4}}
.skeleton{animation:shimmer 1.5s infinite;background:#e8edf2;border-radius:8px;display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .2s ease;}

/* ── ICON BUTTONS ── */
.icon-btn{width:34px;height:34px;border-radius:9px;background:#f8fafc;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.icon-btn:hover{background:#f1f5f9;}

/* ── GW STATUS ── */
.gw-strip{padding:8px 18px;background:#f0fdf4;border-top:1px solid #dcfce7;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.gw-strip-text{font-size:10px;font-weight:700;color:#166534;}
.gw-strip-sub{font-size:9.5px;color:#86efac;margin-left:2px;}

@media(max-width:768px){
  .left-panel{width:100%;border-right:none;}
  .right-panel{display:none;}
}
</style>

function wmo(c){
  if(c===0)return{e:'☀️',l:'Clear'};
  if(c<=2)return{e:'⛅',l:'Partly Cloudy'};
  if(c===3)return{e:'☁️',l:'Overcast'};
  if(c<=49)return{e:'🌫️',l:'Fog'};
  if(c<=59)return{e:'🌦️',l:'Drizzle'};
  if(c<=69)return{e:'🌧️',l:'Rain'};
  if(c<=79)return{e:'🌨️',l:'Snow'};
  if(c<=82)return{e:'🌧️',l:'Showers'};
  if(c<=86)return{e:'🌨️',l:'Snow'};
  return{e:'⛈️',l:'Storm'};
}
async function fetchWeather(){
  const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=49.605&longitude=-119.673'
    +'&current=temperature_2m,wind_speed_10m,relative_humidity_2m,weather_code,apparent_temperature,precipitation'
    +'&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,weather_code'
    +',et0_fao_evapotranspiration,precipitation_sum,relative_humidity_2m_max,relative_humidity_2m_min'
    +'&hourly=temperature_2m&timezone=America%2FVancouver&forecast_days=7');
  if(!r.ok)throw new Error('weather');
  const d=await r.json(),c=d.current,dy=d.daily,hr=d.hourly;
  const nm=t=>new Date(t+'T12:00').toLocaleDateString('en',{weekday:'short'});

  // Tonight's low: next 18 hours of hourly temps
  const now=new Date();
  const tonightLow=Math.min(...hr.time.slice(0,18).map((_,i)=>hr.temperature_2m[i]).filter(t=>t!=null));

  // GDD base 10°C accumulated over forecast (simplified)
  const gddDaily=dy.temperature_2m_max.map((mx,i)=>Math.max(0,((mx+dy.temperature_2m_min[i])/2)-10));

  // Evapotranspiration next 3 days sum (mm) — how much water soil loses
  const et3=dy.et0_fao_evapotranspiration.slice(0,3).reduce((a,v)=>a+(v||0),0);

  // Rain incoming in next 3 days (total mm)
  const rain3=dy.precipitation_sum.slice(0,3).reduce((a,v)=>a+(v||0),0);

  // Humidity risk: high humidity + warm = disease pressure
  const humidityMax=dy.relative_humidity_2m_max?.[0]??null;

  return{
    current:{
      temp:Math.round(c.temperature_2m),
      feelsLike:Math.round(c.apparent_temperature),
      wind:Math.round(c.wind_speed_10m),
      humidity:Math.round(c.relative_humidity_2m),
      precip:c.precipitation??0,
      ...wmo(c.weather_code)
    },
    forecast:dy.time.map((_,i)=>({
      day:i===0?'Today':nm(dy.time[i]),
      high:Math.round(dy.temperature_2m_max[i]),
      low:Math.round(dy.temperature_2m_min[i]),
      rain:dy.precipitation_probability_max[i],
      rainMm:Math.round((dy.precipitation_sum[i]||0)*10)/10,
      wind:Math.round(dy.wind_speed_10m_max[i]),
      et:Math.round((dy.et0_fao_evapotranspiration[i]||0)*10)/10,
      humMax:Math.round(dy.relative_humidity_2m_max?.[i]??0),
      gdd:Math.round(gddDaily[i]*10)/10,
      ...wmo(dy.weather_code[i])
    })),
    insights:{
      tonightLow:Math.round(tonightLow),
      et3:Math.round(et3*10)/10,
      rain3:Math.round(rain3*10)/10,
      humidityMax:humidityMax?Math.round(humidityMax):null,
      gdd7:Math.round(gddDaily.slice(0,7).reduce((a,v)=>a+v,0)*10)/10,
    }
  };
}

/* ══ BRIEFING LOGIC ════════════════════════════════════ */
function buildBriefing(zones,weather){
  const crits=zones.filter(z=>z.status==='Critical');
  const warns=zones.filter(z=>z.status==='Action Required');
  const rainDays=(weather?.forecast||[]).filter(d=>d.rain>=50);
  const rainToday=rainDays.length>0&&rainDays[0].day==='Today';

  let action='';
  if(rainToday){
    action='Rain today — skip all irrigation.';
  } else if(crits.length>0&&warns.length>0){
    action=`Water ${crits.map(z=>z.name).join(' & ')} today. Schedule ${warns.map(z=>z.name).join(', ')} soon.`;
  } else if(crits.length>0){
    action=`Water ${crits.map(z=>z.name).join(' & ')} today.`;
  } else if(warns.length>0){
    action=`Monitor ${warns.map(z=>z.name).join(', ')} — water within 2 days.`;
  } else {
    action='All blocks healthy. No irrigation needed today.';
  }

  let weatherNote='';
  if(!rainToday&&rainDays.length>0){
    const next=rainDays[0];
    weatherNote=`${next.day} has ${next.rain}% rain chance — you may be able to skip watering beforehand.`;
  }

  return{action,weatherNote,crits:crits.length,warns:warns.length,healthy:zones.filter(z=>z.status==='Optimal').length};
}

/* ══ MAP COMPONENT ══════════════════════════════════════ */
function FarmMap({zones,farmId,farms,onZoneClick}){
  const ref=useRef(null);
  const mapRef=useRef(null);
  const satRef=useRef(null);
  const streetRef=useRef(null);
  const zLayersRef=useRef([]);
  const fMarkersRef=useRef([]);
  const [mode,setMode]=useState('sat');

  useEffect(()=>{
    if(!ref.current||mapRef.current)return;
    const map=L.map(ref.current,{center:[49.598422,-119.664789],zoom:15,zoomControl:true,attributionControl:true});
    map.attributionControl.setPrefix('');
    satRef.current=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,attribution:'© ESRI'});
    streetRef.current=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'});
    satRef.current.addTo(map);
    mapRef.current=map;
    return()=>{map.remove();mapRef.current=null;};
  },[]);

  // Render all 3 farm markers always
  useEffect(()=>{
    const map=mapRef.current;if(!map)return;
    fMarkersRef.current.forEach(m=>map.removeLayer(m));fMarkersRef.current=[];
    const colors=['#166534','#1d4ed8','#b45309'];
    farms.forEach((f,i)=>{
      const cur=i===farmId;
      const icon=L.divIcon({className:'farm-marker-icon',
        html:`<div class="farm-pin" style="background:${cur?'white':colors[i]};color:${cur?colors[i]:'white'};border-color:${cur?colors[i]:'white'};font-size:${cur?11:10}px">${f.icon} ${f.name}</div>`,
        iconAnchor:[0,0]});
      L.marker([f.lat,f.lng],{icon,zIndexOffset:cur?1000:0}).addTo(map);
      fMarkersRef.current.push(L.marker([f.lat,f.lng],{icon,zIndexOffset:cur?1000:0}));
    });
  },[farmId,farms]);

  // Draw zone polygons for current farm
  useEffect(()=>{
    const map=mapRef.current;if(!map)return;
    zLayersRef.current.forEach(l=>map.removeLayer(l));zLayersRef.current=[];
    if(!zones.length){
      // Show all 3 farm pins and fit to them
      const pts=farms.map(f=>L.latLng(f.lat,f.lng));
      map.fitBounds(L.latLngBounds(pts),{padding:[60,60],maxZoom:14});
      return;
    }
    zones.forEach(z=>{
      const fill=MAP_FILL[z.status]||'rgba(148,163,184,.35)';
      const stroke=MAP_STROKE[z.status]||'#94a3b8';
      const cfg=S[z.status];
      const poly=L.polygon(z.coords,{fillColor:fill,fillOpacity:1,color:stroke,weight:2.5,opacity:.95});
      poly.bindPopup(
        `<div style="padding:14px 16px">
          <div style="font-size:15px;font-weight:800;color:#1e293b;margin-bottom:6px">${z.name}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:11px;color:#64748b">${z.crop} · ${z.moisture}% moisture</span>
            <span style="font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;background:${cfg.bg};color:${cfg.color};border:1.5px solid ${cfg.border}">${z.status}</span>
          </div>
        </div>`,{maxWidth:280,closeButton:false}
      );
      poly.on('click',()=>onZoneClick&&onZoneClick(z.id));
      poly.addTo(map);zLayersRef.current.push(poly);
    });
    const all=zones.flatMap(z=>z.coords);
    map.fitBounds(L.latLngBounds(all),{padding:[32,32]});
  },[zones,farms]);

  const switchLayer=m=>{
    const map=mapRef.current;if(!map)return;
    setMode(m);
    if(m==='sat'){map.removeLayer(streetRef.current);satRef.current.addTo(map);}
    else{map.removeLayer(satRef.current);streetRef.current.addTo(map);}
    zLayersRef.current.forEach(l=>l.bringToFront());
  };

  return(
    <div className="map-container">
      <div ref={ref} id="leaflet-map"/>
      <div className="map-overlay-btns">
        <button onClick={()=>switchLayer('sat')} className={`map-btn${mode==='sat'?' active':''}`}>🛰 Sat</button>
        <button onClick={()=>switchLayer('street')} className={`map-btn${mode==='street'?' active':''}`}>🗺 Street</button>
      </div>
    </div>
  );
}

                  </div>
                </div>

                <div className={`signal-cell ${etState}`}>
                  <div className="signal-icon">{netBalance<-3?'💦':netBalance<0?'🌿':'🌧️'}</div>
                  <div className="signal-label">3-Day Water Balance</div>
                  <div className="signal-value">{netBalance>0?'+':''}{netBalance} mm</div>
                  <div className="signal-sub">
                    {ins.rain3||0}mm rain vs {ins.et3||0}mm lost to evaporation
                    {netBalance<-3?' · Soil drying fast':netBalance<0?' · Slight deficit':'· Rain covering losses'}
                  </div>
                </div>

                <div className={`signal-cell ${heatState}`}>
                  <div className="signal-icon">{heatToday?'🔥':'☀️'}</div>
                  <div className="signal-label">Heat Stress</div>
                  <div className="signal-value">{forecast[0]?.high??'—'}°C today</div>
                  <div className="signal-sub">
                    {heatToday?'Above 30°C — moisture depletes faster than normal':
                     (forecast[0]?.high??0)>=25?'Warm — check critical blocks by afternoon':
                     'Moderate temps — normal depletion rate'}
                  </div>
                </div>

                <div className={`signal-cell ${diseaseState}`}>
                  <div className="signal-icon">{diseasePressure?'⚠️':'🍃'}</div>
                  <div className="signal-label">Disease Pressure</div>
                  <div className="signal-value">{ins.humidityMax??'—'}% max RH</div>
                  <div className="signal-sub">
                    {diseasePressure?'High humidity + warm temps — brown rot / scab risk elevated':
                     'Humidity within safe range for cherries & apples'}
                  </div>
                </div>

              </div>

              {/* ET depletion bar */}
              <div className="et-section">
                <div className="et-label-row">
                  <span style={{fontSize:9,fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'1.2px'}}>Evapotranspiration loss · next 3 days</span>
                  <span style={{fontSize:10,fontWeight:800,color:'#d97706'}}>{ins.et3??'—'} mm</span>
                </div>
                <div className="et-bar-bg">
                  <div className="et-bar-fill" style={{width:`${Math.min(100,((ins.et3||0)/12)*100)}%`}}/>
                </div>
                <div style={{fontSize:9,color:'#94a3b8',marginTop:4}}>Higher in heat &amp; wind · directly drives how fast your blocks dry out</div>
              </div>

              {/* 7-day forecast */}
              <div style={{borderTop:'1px solid #f1f5f9'}}>
                <div style={{padding:'5px 14px 3px',background:'#f8faf8'}}>
                  <span style={{fontSize:9,fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'1.4px'}}>7-Day Forecast</span>
                </div>
                <div className="forecast-row">
                  {forecast.map((d,i)=>{
                    const frost=d.low<=2;
                    const rain=d.rain>=50;
                    return(
                      <div key={i} className={`forecast-cell${rain?' rain-day':frost?' frost-day':''}`}>
                        <div className={`fc-day-label${rain?' rain-label':frost?' frost-label':''}`}>{d.day}</div>
                        <div className="fc-icon">{d.e}</div>
                        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}>
                          <span className="fc-high">{d.high}°</span>
                          <span className={`fc-low${frost?' frost':''}`}>{d.low}°</span>
                        </div>
                        {rain&&<span className="fc-tag" style={{background:'#dbeafe',color:'#1d4ed8'}}>{d.rain}%</span>}
                        {frost&&!rain&&<span className="fc-tag" style={{background:'#ede9fe',color:'#7c3aed'}}>❄</span>}
                        {d.et>0&&<span style={{fontSize:7.5,color:'#94a3b8',marginTop:1}}>{d.et}mm ET</span>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            );
          })()}


        </div>

        {/* Gateway strip */}
        <div className="gw-strip">
          <div className="gw-pulse" style={{width:7,height:7,borderRadius:'50%',background:'#10b981',flexShrink:0}}/>
          <span className="gw-strip-text">LoRa Gateway Online</span>
          <span className="gw-strip-sub">· Home Farm · –94 dBm</span>
        </div>
      </div>

      {/* ── RIGHT PANEL — MAP ── */}
      <div className="right-panel">
        <div className="topbar" style={{borderBottom:'1px solid #e2e8f0',paddingLeft:20,paddingRight:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'#475569'}}>{farm.name} — Satellite View</div>
            {zones.length>0&&<div style={{fontSize:10,color:'#94a3b8'}}>Tap a block to inspect</div>}
          </div>
          {/* Legend */}
          <div style={{display:'flex',gap:12,alignItems:'center'}}>
            {[['Critical','#f43f5e'],['Monitor','#fbbf24'],['Healthy','#10b981']].map(([l,c])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:10,fontWeight:700,color:'#64748b'}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:c}}/>
                {l}
              </div>
            ))}
          </div>
        </div>

        <FarmMap
          zones={zones}
          farmId={farmId}
          farms={FARMS}
          onZoneClick={id=>{setSelId(selId===id?null:id);}}
        />

        {/* No blocks overlay for Jones Flat and Dump Road */}
        {zones.length===0&&(
          <div style={{position:'absolute',bottom:32,left:'50%',transform:'translateX(-50%)',zIndex:500}}>
            <div style={{background:'white',borderRadius:14,padding:'14px 22px',border:'1.5px solid #e2e8f0',boxShadow:'0 4px 20px rgba(0,0,0,.10)',textAlign:'center',whiteSpace:'nowrap'}}>
              <div style={{fontSize:13,fontWeight:700,color:'#475569',marginBottom:4}}>{farm.icon} {farm.name} — {farm.location}</div>
              <div style={{fontSize:11,color:'#94a3b8'}}>No blocks mapped yet · Upload a KML file to add zones</div>
            </div>
          </div>
        )}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
