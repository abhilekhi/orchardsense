<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="OrchardSense"/>
  <meta name="theme-color" content="#166534"/>
  <meta name="description" content="OrchardSense soil moisture monitoring — BC Okanagan"/>

  <title>OrchardSense Monitoring</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22OrchardSense%22%2C%22short_name%22%3A%22OrchardSense%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f2f0%22%2C%22theme_color%22%3A%22%23166534%22%7D"/>

  <!-- Leaflet Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="./src/styles/index.css" />

  <!-- Babel Standalone (The Fix for JSX/MIME errors) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    #loading-screen {
      position: fixed; inset: 0; background: #f8fafc;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; font-family: system-ui, sans-serif;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #166534;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <div style="color: #64748b; font-weight: 600; font-size: 14px;">OrchardSense</div>
  </div>

  <div id="root"></div>

  <!-- Import Map: Links React to the browser -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom": "https://esm.sh/react-dom@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client"
      }
    }
  </script>

  <!-- 
    The fix is in this script block. 
    By setting type="text/babel", we tell Babel Standalone to process this code.
    By NOT using data-type="module", we prevent the browser's strict native loader
    from trying (and failing) to fetch .jsx files directly.
  -->
  <script type="text/babel">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import App from './src/App.jsx';

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

    // Hide loader
    window.addEventListener('load', () => {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
    });
  </script>

</body>
</html><!DOCTYPE html>
<html lang="en">
