<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Lekhi Farm"/>
  <meta name="theme-color" content="#166534"/>
  <meta name="description" content="Lekhi Farm soil moisture monitoring — BC Okanagan"/>

  <title>Lekhi Farm Monitoring</title>

  <!-- PWA manifest (inline — no extra file needed) -->
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Lekhi%20Farm%20Monitoring%22%2C%22short_name%22%3A%22Lekhi%20Farm%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f2f0%22%2C%22theme_color%22%3A%22%23166534%22%7D"/>

  <!-- SVG favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23166534'/%3E%3Cpath d='M32 52C32 52 16 42 16 28C16 20.27 23.16 14 32 14C40.84 14 48 20.27 48 28C48 42 32 52 32 52Z' fill='%2386efac'/%3E%3Cpath d='M32 52L32 22' stroke='%23166534' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E"/>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <!-- App styles -->
  <link rel="stylesheet" href="src/styles/index.css"/>

  <!-- Apple touch icon — generated by JS below -->
  <script>
    // Generate 180×180 canvas icon for iOS home screen
    window.addEventListener('DOMContentLoaded', () => {
      const c = document.createElement('canvas');
      c.width = c.height = 180;
      const x = c.getContext('2d');
      const g = x.createLinearGradient(0, 0, 180, 180);
      g.addColorStop(0, '#166534'); g.addColorStop(1, '#14532d');
      x.fillStyle = g;
      x.beginPath();
      x.moveTo(32,0);x.lineTo(148,0);x.quadraticCurveTo(180,0,180,32);
      x.lineTo(180,148);x.quadraticCurveTo(180,180,148,180);
      x.lineTo(32,180);x.quadraticCurveTo(0,180,0,148);
      x.lineTo(0,32);x.quadraticCurveTo(0,0,32,0);x.fill();
      x.fillStyle = 'rgba(0,0,0,.18)';
      x.beginPath();x.ellipse(90,142,44,11,0,0,Math.PI*2);x.fill();
      x.fillStyle = '#86efac';
      x.beginPath();
      x.moveTo(90,152);x.bezierCurveTo(90,152,44,126,44,84);
      x.bezierCurveTo(44,60,65,42,90,42);x.bezierCurveTo(115,42,136,60,136,84);
      x.bezierCurveTo(136,126,90,152,90,152);x.fill();
      x.strokeStyle='#166534';x.lineWidth=6;x.lineCap='round';
      x.beginPath();x.moveTo(90,152);x.lineTo(90,60);x.stroke();
      x.lineWidth=4;
      x.beginPath();x.moveTo(90,110);x.bezierCurveTo(80,98,68,88,62,80);x.stroke();
      x.beginPath();x.moveTo(90,90);x.bezierCurveTo(100,80,112,72,118,66);x.stroke();
      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = c.toDataURL('image/png');
      document.head.appendChild(link);
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Leaflet JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- React + ReactDOM from ESM CDN (no build step needed) -->
  <script type="module">
    import { createElement } from 'https://esm.sh/react@18';
    import { createRoot }    from 'https://esm.sh/react-dom@18/client';
    import App from './src/App.jsx';

    createRoot(document.getElementById('root')).render(createElement(App));
  </script>
</body>
</html>
